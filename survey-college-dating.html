<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生恋爱问题调查问卷</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rose: #c44d6a; --rose-light: #fdf2f5; --rose-dark: #a33a54;
    --bg: #faf7f8; --card-bg: #fff; --text: #2d2d2d; --text-muted: #777;
    --border: #e8dde0; --shadow: 0 2px 12px rgba(0,0,0,.06);
    --radius: 12px; --transition: .25s ease;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #c44d6a 0%, #d4748a 50%, #e898a8 100%);
    color: #fff; padding: 32px 20px 28px; text-align: center;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(196,77,106,.25);
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: .02em; }
  .header .sub { font-size: .88rem; opacity: .88; margin-top: 4px; }

  /* Progress */
  .progress-wrap {
    max-width: 640px; margin: 0 auto; padding: 0 20px;
  }
  .progress-bar-outer {
    height: 6px; background: rgba(255,255,255,.3); border-radius: 3px;
    margin-top: 16px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: #fff; border-radius: 3px; transition: width .4s ease;
    width: 0%;
  }
  .progress-text { font-size: .78rem; margin-top: 6px; opacity: .8; }

  /* Main */
  .main {
    max-width: 640px; margin: 0 auto; padding: 20px 16px 80px;
  }

  /* Section */
  .section {
    background: var(--card-bg); border-radius: var(--radius); padding: 28px 24px;
    margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);
    transition: opacity .3s;
  }
  .section.hidden { display: none; }
  .section-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    padding-bottom: 14px; border-bottom: 2px solid var(--rose-light);
  }
  .section-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--rose); color: #fff; font-size: .85rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .section-title { font-size: 1.08rem; font-weight: 700; color: var(--rose-dark); }
  .section-sub { font-size: .8rem; color: var(--text-muted); margin-left: auto; }

  /* Question */
  .q {
    margin-bottom: 22px; padding-bottom: 18px;
    border-bottom: 1px solid #f5f0f1;
  }
  .q:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .q-label {
    font-size: .95rem; font-weight: 600; margin-bottom: 10px; color: #333;
  }
  .q-num { color: var(--rose); font-weight: 700; margin-right: 4px; }
  .q-type-tag {
    font-size: .72rem; color: var(--text-muted); font-weight: 400;
    background: #f8f4f5; padding: 1px 8px; border-radius: 10px;
    margin-left: 6px; white-space: nowrap;
  }
  .q-note {
    font-size: .8rem; color: var(--text-muted); font-style: italic; margin-bottom: 6px;
  }

  /* Options */
  .opts { display: flex; flex-direction: column; gap: 6px; }
  .opt {
    display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; transition: background var(--transition);
    border: 1.5px solid transparent;
  }
  .opt:hover { background: #fdf5f7; }
  .opt input { display: none; }
  .opt-radio {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid #ccc; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .opt-check {
    font-size: 1.3rem; line-height: 1; flex-shrink: 0;
    width: 22px; text-align: center;
    transition: color .2s;
  }
  .opt.selected { border-color: var(--rose) !important; background: #fef6f8 !important; }
  .opt.selected .opt-radio { border-color: var(--rose); }
  .opt.selected .opt-radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--rose);
  }
  .opt-text { font-size: .9rem; line-height: 1.5; }

  /* Likert */
  .likert-row {
    display: flex; align-items: center; gap: 0;
    background: #faf7f8; border-radius: 10px; padding: 4px;
  }
  .likert-opt {
    flex: 1; text-align: center; padding: 10px 4px; cursor: pointer;
    border-radius: 8px; transition: all var(--transition);
    font-size: .8rem; color: var(--text-muted); user-select: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .likert-opt:hover { background: #fdf5f7; color: var(--rose); }
  .likert-opt.selected { background: var(--rose); color: #fff; font-weight: 600; }
  .likert-opt input { display: none; }
  .likert-labels {
    display: flex; justify-content: space-between; font-size: .72rem;
    color: var(--text-muted); margin-top: 4px; padding: 0 4px;
  }
  .likert-circle {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem; font-weight: 600; transition: all var(--transition);
  }
  .likert-opt.selected .likert-circle { border-color: #fff; }

  /* Warning banner */
  .warning-banner {
    background: #fff8e1; border-left: 3px solid #f0c040;
    padding: 10px 14px; border-radius: 6px; margin-bottom: 14px;
    font-size: .82rem; color: #8a6d14;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
  .btn {
    padding: 12px 32px; border-radius: 8px; font-size: .95rem; font-weight: 600;
    cursor: pointer; border: none; transition: all var(--transition);
  }
  .btn-primary { background: var(--rose); color: #fff; }
  .btn-primary:hover { background: var(--rose-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196,77,106,.35); }
  .btn-outline { background: #fff; color: var(--rose); border: 2px solid var(--rose); }
  .btn-outline:hover { background: var(--rose-light); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Results */
  .result-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 32px 24px;
    box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
  }
  .result-section { margin-bottom: 20px; }
  .result-section h3 {
    font-size: 1rem; color: var(--rose-dark); margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--rose-light);
  }
  .result-item {
    display: flex; justify-content: space-between; padding: 4px 0;
    font-size: .88rem;
  }
  .result-item .q-text { color: var(--text-muted); flex: 1; }
  .result-item .a-text { font-weight: 600; text-align: right; max-width: 55%; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
    font-size: .85rem; z-index: 999; opacity: 0; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 1.2rem; }
    .section { padding: 20px 14px; }
    .likert-opt { font-size: .7rem; padding: 8px 2px; }
    .likert-circle { width: 24px; height: 24px; font-size: .7rem; }
  }

  /* ===== 结果页 ===== */
  #main .result-hero {
    text-align: center; padding: 8px 0 20px;
  }
  #main .result-hero h2 { color: var(--rose-dark); margin-bottom: 4px; font-size: 1.3rem; }
  #main .result-subtitle { color: var(--text-muted); font-size: .85rem; }

  /* 类型徽章 */
  #main .type-badge-card {
    border-radius: 20px; padding: 32px 20px 24px; margin-bottom: 16px;
    text-align: center; color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,.10);
    animation: fadeInUp .5s cubic-bezier(0.16,1,0.3,1);
  }
  #main .type-badge-card .big-emoji { font-size: 3.5rem; display: block; margin-bottom: 8px; }
  #main .type-badge-card .type-name { font-size: 1.6rem; font-weight: 800; letter-spacing: .04em; margin-bottom: 4px; }
  #main .type-badge-card .type-subtitle { font-size: .9rem; opacity: .9; font-style: italic; max-width: 320px; margin: 0 auto; }
  #main .type-badge-card .type-desc { font-size: .85rem; opacity: .92; max-width: 420px; margin: 12px auto 0; line-height: 1.7; }

  /* 维度进度条 */
  #main .dims-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 24px 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
  }
  #main .dims-card h3 { color: var(--rose-dark); margin-bottom: 16px; font-size: 1rem; }
  #main .dim-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  #main .dim-label { width: 75px; font-size: .82rem; font-weight: 600; color: #555; text-align: right; flex-shrink: 0; }
  #main .dim-bar-wrap { flex: 1; height: 22px; background: #f0eaec; border-radius: 11px; overflow: hidden; position: relative; }
  #main .dim-bar-fill { height: 100%; border-radius: 11px; transition: width .8s cubic-bezier(0.16,1,0.3,1); }
  #main .dim-score { width: 32px; font-size: .8rem; font-weight: 700; color: #888; text-align: center; }

  /* 雷达图 */
  #main .chart-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
    text-align: center;
  }

  /* 标签云 */
  #main .tags-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
    text-align: center;
  }
  #main .tag {
    display: inline-block; padding: 4px 14px; border-radius: 14px;
    font-size: .8rem; font-weight: 600; margin: 3px 4px;
    background: #fdf2f5; color: #c44d6a; border: 1px solid #f0d0d8;
  }

  /* 洞察卡片 */
  #main .insights-card {
    background: var(--card-bg); border-radius: var(--radius); padding: 24px 20px;
    box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
  }
  #main .insights-card h3 { color: var(--rose-dark); margin-bottom: 14px; font-size: 1rem; }
  #main .insight-item {
    display: flex; gap: 10px; padding: 12px 14px; margin-bottom: 8px;
    background: #fdf8f9; border-radius: 10px; font-size: .88rem; line-height: 1.6;
    border-left: 3px solid var(--rose);
  }
  #main .insight-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
  #main .insight-text { color: #444; }

  /* 答案折叠 */
  #main .answers-detail { margin-top: 16px; }
  #main .answers-toggle {
    background: none; border: 1px dashed #ccc; color: #999; font-size: .82rem;
    padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: all var(--transition);
  }
  #main .answers-toggle:hover { border-color: var(--rose); color: var(--rose); }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>

<div class="header">

    {id:6, sec:"二、恋爱经历（8题）", type:"radio", text:"你目前的恋爱状态是？", opts:[{v:"A",t:"正在恋爱中"},{v:"B",t:"单身，从未谈过恋爱"},{v:"C",t:"单身，曾经谈过恋爱"},{v:"D",t:"暧昧中 / 说不清"},{v:"E",t:"已订婚 / 已婚"}]},

// ===== STATE =====
let answers = {};       // {id: value}  — value is string for radio/likert/textarea, array for checkbox
let submitted = false;

// ===== HELPERS =====
function getVal(id) { return answers[id]; }
function isAnswered(id) {
  const v = answers[id];
  if (v === undefined || v === null) return false;
  if (Array.isArray(v)) return v.length > 0;
  return v !== '';
}
function countAnswered() {
  const visIds = new Set(visibleQuestions().map(q=>q.id));
  let n = 0;
  for (let i=1; i<=55; i++) if (visIds.has(i) && isAnswered(i)) n++;
  return n;
}
function totalVisible() { return visibleQuestions().length; }

// ===== RENDER =====
function visibleQuestions() {
  return ALL_QUESTIONS.filter(q => {
    if (!q.showIf) return true;
    return q.showIf(q);
  });
}

function renderAll() {
  const main = document.getElementById('main');
  const answeredSet = new Set();
  let html = '';
  let currentSec = '';

  const vis = visibleQuestions();
  const visIds = new Set(vis.map(q=>q.id));

  for (const q of ALL_QUESTIONS) {
    const hidden = !visIds.has(q.id);

    // Section header
    if (q.sec !== currentSec) {
      if (currentSec) html += '</div>'; // close previous section
      currentSec = q.sec;
      const secNum = currentSec.match(/^[一二三四五六七八九十]+/)?.[0] || '';
      html += `<div class="section${hidden?' hidden':''}" data-section="${currentSec}">`;
      html += `<div class="section-header"><div class="section-num">${secNum||'?'}</div><span class="section-title">${currentSec}</span></div>`;
      if (q.warning) {
        html += `<div class="warning-banner">⚠️ ${q.warning}</div>`;
      }
    } else if (q.warning) {
      html += `<div class="warning-banner">⚠️ ${q.warning}</div>`;
    }

    html += `<div class="q" data-qid="${q.id}"${hidden?' style="display:none"':''}>`;
    html += `<div class="q-label"><span class="q-num">${q.id}.</span>${q.text}`;
    if (q.type === 'checkbox') html += `<span class="q-type-tag">可多选${q.max?'（最多'+q.max+'项）':''}</span>`;
    else if (q.type === 'likert') html += `<span class="q-type-tag">量表</span>`;
    html += `</div>`;
    if (q.note) html += `<div class="q-note">${q.note}</div>`;

    // Render options
    if (q.type === 'radio') {
      html += `<div class="opts">`;
      for (const o of q.opts) {
        const sel = getVal(q.id) === o.v ? ' selected' : '';
        html += `<label class="opt${sel}" onclick="setRadio(${q.id},'${o.v}',this)"><input type="radio" name="q${q.id}" value="${o.v}"${sel?' checked':''}><span class="opt-radio"></span><span class="opt-text">${o.v}. ${o.t}</span></label>`;
      }
      html += `</div>`;
    } else if (q.type === 'checkbox') {
      html += `<div class="opts">`;
      const vals = Array.isArray(answers[q.id]) ? answers[q.id] : [];
      for (const o of q.opts) {
        const sel = vals.includes(o.v) ? ' selected' : '';
        html += `<label class="opt${sel}" onclick="toggleCheck(${q.id},'${o.v}',this,${q.max||999})"><span class="opt-check" style="font-size:1.2rem;">${vals.includes(o.v)?'☑':'☐'}</span><span class="opt-text">${o.v}. ${o.t}</span></label>`;
      }
      html += `</div>`;
    } else if (q.type === 'likert') {
      html += `<div class="likert-row">`;
      for (let i=1; i<=5; i++) {
        const sel = getVal(q.id) === String(i) ? ' selected' : '';
        html += `<label class="likert-opt${sel}" onclick="setRadio(${q.id},'${i}',this)"><input type="radio" name="q${q.id}" value="${i}"${sel?' checked':''}><span class="likert-circle">${i}</span></label>`;
      }
      html += `</div><div class="likert-labels"><span>非常不同意</span><span>非常同意</span></div>`;
    } else if (q.type === 'textarea') {
      html += `<textarea style="width:100%;padding:12px;border:2px solid #e0d8da;border-radius:8px;font-size:.9rem;resize:vertical;min-height:80px;font-family:inherit;" placeholder="${q.placeholder||''}" maxlength="${q.maxlen||200}" oninput="setText(${q.id},this.value)">${answers[q.id]||''}</textarea>`;
    }

    html += `</div>`;
  }
  if (currentSec) html += '</div>'; // close last section

  main.innerHTML = html;

  // Re-apply hidden state to sections where ALL questions are hidden
  const sections = main.querySelectorAll('.section');
  for (const sec of sections) {
    const visibleQs = sec.querySelectorAll('.q:not([style*="display:none"])');
    if (visibleQs.length === 0) sec.classList.add('hidden');
    else sec.classList.remove('hidden');
  }

  updateProgress();
  saveToLocal();
}

function updateProgress() {
  const n = countAnswered();
  const total = visibleQuestions().length;
  const pct = total > 0 ? Math.round(n / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = n + ' / ' + total + ' 题已回答';
}

// ===== ANSWER HANDLERS =====
function setRadio(qid, value, labelEl) {
  answers[qid] = value;
  // Update UI in the same question group
  const qDiv = labelEl.closest('.q');
  if (qDiv) {
    qDiv.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    qDiv.querySelectorAll('.likert-opt').forEach(o => o.classList.remove('selected'));
  }
  labelEl.classList.add('selected');
  updateProgress();
  saveToLocal();
  // Re-render to update conditional visibility
  if (qid === 6) renderAll();
}

function toggleCheck(qid, value, labelEl, max) {
  if (!Array.isArray(answers[qid])) answers[qid] = [];
  const arr = answers[qid];
  const idx = arr.indexOf(value);
  const checkSpan = labelEl.querySelector('.opt-check');

  if (idx >= 0) {
    arr.splice(idx, 1);
    labelEl.classList.remove('selected');
    if (checkSpan) checkSpan.textContent = '☐';
  } else {
    if (arr.length >= max) {
      const removed = arr.shift();
      const qDiv = labelEl.closest('.q');
      if (qDiv) {
        const oldOpt = qDiv.querySelector('.opt.selected');
        if (oldOpt) {
          oldOpt.classList.remove('selected');
          const oldCs = oldOpt.querySelector('.opt-check');
          if (oldCs) oldCs.textContent = '☐';
        }
      }
    }
    arr.push(value);
    labelEl.classList.add('selected');
    if (checkSpan) checkSpan.textContent = '☑';
  }
  updateProgress();
  saveToLocal();
}
function setText(qid, value) {
  answers[qid] = value;
  updateProgress();
  saveToLocal();
}

// ===== PERSISTENCE =====
function saveToLocal() {
  try { localStorage.setItem('survey_college_dating', JSON.stringify(answers)); } catch(e) {}
}
function loadFromLocal() {
  try {
    const raw = localStorage.getItem('survey_college_dating');
    if (raw) answers = JSON.parse(raw);
  } catch(e) {}
}

function submitSurvey() {
  const vis = visibleQuestions();
  const unanswered = vis.filter(q => !isAnswered(q.id)).map(q=>q.id);
  if (unanswered.length > 0) {
    showToast(`还有 ${unanswered.length} 题未回答，请检查后再提交`);
    const firstQ = document.querySelector(`.q[data-qid="${unanswered[0]}"]`);
    if (firstQ) firstQ.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  submitted = true;
  showResults();
  uploadToCloud();
}

async function uploadToCloud() {
  const statusEl = document.getElementById('cloudStatus');
  if (!statusEl) return;
  statusEl.textContent = '⏳ 正在提交到云端...';
  statusEl.style.color = '#888';

  // Build submission JSON
  const payload = {
    submitted_at: new Date().toISOString(),
    answers: {}
  };
  for (let i = 1; i <= 55; i++) {
    const val = answers[i];
    if (val === undefined || val === null || val === '') continue;
    payload.answers['q' + i] = Array.isArray(val) ? val.join('；') : String(val);
  }

  const ts = new Date().toISOString().replace(/[:.]/g, '-');
  const filename = 'data/' + ts + '.json';
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));

  try {
    const resp = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filename}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GH_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: '问卷提交 ' + ts,
        content: content
      })
    });
    if (resp.ok) {
      statusEl.innerHTML = '✅ 已提交到云端';
      statusEl.style.color = '#4a8';
    } else {
      const err = await resp.text();
      statusEl.textContent = '❌ 服务器拒绝 (' + resp.status + '): ' + err.substring(0,200);
      statusEl.style.color = '#c44';
    }
  } catch(e) {
    statusEl.textContent = '❌ 无法连接: ' + e.message;
    statusEl.style.color = '#c44';
  }
}

function score(val) { const v=parseInt(val); return isNaN(v)?3:v; }
function ansStr(qid) {
  const v=answers[qid]; if(!v) return '';
  const q=ALL_QUESTIONS.find(q=>q.id===qid); if(!q) return v;
  if(Array.isArray(v)) return v.map(x=>{const o=q.opts.find(o=>o.v===x);return o?o.v+'. '+o.t:x;}).join('；');
  if(q.type==='likert') return v+' 分';
  const o=q.opts?.find(o=>o.v===v); return o?o.v+'. '+o.t:v;
}

function generateProfile() {
  const dims = {
    labels: ['恋爱必要感','现实悲观度','婚姻导向','关系开放度','门第重视','传统性别观'],
    qids: [14,15,16,17,18,19],
    scores: [14,15,16,17,18,19].map(id=>score(answers[id]||3))
  };
  let matched = DATING_TYPES.find(t=>t.test(Object.fromEntries(dims.qids.map((id,i)=>[id,dims.scores[i]]))));
  if (!matched) matched = DATING_TYPES[DATING_TYPES.length-1];
  return { ...matched, dimensions: dims };
}

function drawRadarChart(dims) {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  const N = dims.labels.length;
  const size = Math.min(canvas.parentElement.clientWidth, 380);
  canvas.width = size * 2;
  canvas.height = size * 2;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  const cx = size, cy = size, r = size * 0.6;
  const levels = 5;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid polygons
  for (let lev = 1; lev <= levels; lev++) {
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const angle = Math.PI * 2 * i / N - Math.PI / 2;
      const lr = r * lev / levels;
      const x = cx + lr * Math.cos(angle);
      const y = cy + lr * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#e8dde0';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Axis lines
  for (let i = 0; i < N; i++) {
    const angle = Math.PI * 2 * i / N - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = '#e8dde0';
    ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const angle = Math.PI * 2 * i / N - Math.PI / 2;
    const score = dims.scores[i] || 3;
    const dr = r * score / levels;
    const x = cx + dr * Math.cos(angle);
    const y = cy + dr * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(196,77,106,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(196,77,106,0.85)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Data points
  for (let i = 0; i < N; i++) {
    const angle = Math.PI * 2 * i / N - Math.PI / 2;
    const score = dims.scores[i] || 3;
    const dr = r * score / levels;
    const x = cx + dr * Math.cos(angle);
    const y = cy + dr * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#c44d6a';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Labels
  ctx.fillStyle = '#555';
  ctx.font = '600 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < N; i++) {
    const angle = Math.PI * 2 * i / N - Math.PI / 2;
    const lr = r + 30;
    const x = cx + lr * Math.cos(angle);
    const y = cy + lr * Math.sin(angle);
    ctx.fillText(dims.labels[i], x, y);
  }
}

function downloadJSON() {
  const data = {timestamp:new Date().toISOString(),answers};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'survey-college-dating-answers.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('已下载 JSON 文件');
}

function resetSurvey() {
  if (submitted || Object.keys(answers).length > 0) {
    if (!confirm('确定要清除所有回答重新填写吗？此操作不可恢复。')) return;
  }
  answers = {};
  submitted = false;
  try { localStorage.removeItem('survey_college_dating'); } catch(e) {}
  document.getElementById('actionArea').style.display = '';
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
